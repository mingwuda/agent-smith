<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>桌面智能体</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:#f5f5f7; height:100vh; display:flex; }
  
  /* 布局 */
  #sidebar {
    width: 280px; background:#1c1c1e; color:#fff; display:flex; flex-direction:column; flex-shrink:0;
    border-right:1px solid #2c2c2e;
  }
  #main { flex:1; display:flex; flex-direction:column; min-width:0; }
  
  /* 侧边栏 */
  #sidebar h2 { font-size:15px; padding:20px 16px 12px; color:#8e8e93; text-transform:uppercase; letter-spacing:1px; }
  .stat-card { padding:12px 16px; border-bottom:1px solid #2c2c2e; }
  .stat-card .label { font-size:11px; color:#8e8e93; text-transform:uppercase; }
  .stat-card .value { font-size:18px; font-weight:600; margin-top:4px; }
  
  #sidebar .section { flex:1; overflow-y:auto; }
  #sidebar .section h3 { font-size:12px; padding:12px 16px 6px; color:#8e8e93; }
  .skill-item { padding:8px 16px; font-size:13px; cursor:pointer; border-left:3px solid transparent; }
  .skill-item:hover { background:#2c2c2e; border-left-color:#007aff; }
  
  /* 聊天区域 */
  #header { padding:16px 24px; background:#fff; border-bottom:1px solid #ddd; display:flex; align-items:center; justify-content:space-between; }
  #header .left { display:flex; align-items:center; gap:6px; }
  #status-dot { width:8px; height:8px; border-radius:50%; background:#aaa; }
  #status-dot.online { background:#30d158; }
  #status-dot.error { background:#ff453a; }
  #status-text { font-size:12px; color:#8e8e93; }
  #header .right { display:flex; align-items:center; gap:8px; }
  #quick-provider-select { min-width:220px; max-width:320px; padding:6px 10px; background:#fff; border:1px solid #ddd; border-radius:8px; font-size:13px; outline:none; }
  #quick-provider-select:focus { border-color:#007aff; }
  .header-btn { padding:6px 12px; background:#f0f0f0; border:1px solid #ddd; border-radius:8px; font-size:13px; cursor:pointer; transition:all .2s; }
  .header-btn:hover { background:#e0e0e0; }
  #logout-btn { padding:6px 12px; background:transparent; border:1px solid #ddd; border-radius:8px; font-size:13px; cursor:pointer; transition:all .2s; color:#8e8e93; }
  #logout-btn:hover { background:#fbe9e7; border-color:#ff453a; color:#ff453a; }
  
  #messages { flex:1; overflow-y:auto; padding:20px 24px; }
  .msg { margin-bottom:16px; max-width:85%; padding:12px 18px; border-radius:14px; font-size:14px; line-height:1.6; word-break:break-word; }
  .msg.user { background:#007aff; color:#fff; margin-left:auto; border-bottom-right-radius:4px; white-space:pre-wrap; }
  .msg.bot { background:#e8e8ed; color:#1d1d1f; border-bottom-left-radius:4px; }
  .msg.bot.streaming-final { display:block; margin-left:0; clear:both; }
  .msg.bot h1, .msg.bot h2, .msg.bot h3 { margin:8px 0 4px; font-size:inherit; font-weight:600; }
  .msg.bot h1 { font-size:18px; }
  .msg.bot h2 { font-size:16px; }
  .msg.bot h3 { font-size:15px; }
  .msg.bot p { margin:4px 0; }
  .msg.bot ul, .msg.bot ol { padding-left:20px; margin:4px 0; }
  .msg.bot li { margin:2px 0; }
  .msg.bot code { background:#d4d4d9; padding:2px 6px; border-radius:4px; font-size:13px; font-family:"SF Mono",Menlo,monospace; }
  .msg.bot pre { background:#1c1c1e; color:#e8e8ed; padding:12px; border-radius:8px; overflow-x:auto; margin:8px 0; }
  .msg.bot pre code { background:transparent; padding:0; color:inherit; font-size:13px; }
  .msg.bot blockquote { border-left:3px solid #999; padding-left:12px; margin:8px 0; color:#666; }
  .msg.bot table { border-collapse:collapse; margin:8px 0; width:100%; font-size:13px; }
  .msg.bot th, .msg.bot td { border:1px solid #ccc; padding:6px 10px; text-align:left; }
  .msg.bot th { background:#d0d0d5; font-weight:600; }
  .msg.bot hr { border:none; border-top:1px solid #ccc; margin:12px 0; }
  .msg.bot a { color:#007aff; text-decoration:underline; }
  .msg.system { background:transparent; color:#8e8e93; font-size:12px; text-align:center; max-width:100%; }
  .msg .msg-time { font-size:10px; opacity:0.6; margin-top:4px; }
  
  #input-area { display:flex; padding:12px 24px 20px; gap:8px; background:#fff; border-top:1px solid #ddd; }
  #input { flex:1; padding:10px 16px; border:1px solid #ddd; border-radius:10px; font-size:14px; outline:none; transition:border-color .2s; }
  #input:focus { border-color:#007aff; }
  #send { padding:10px 22px; background:#007aff; color:#fff; border:none; border-radius:10px; font-size:14px; cursor:pointer; transition:background .2s; }
  #send:hover { background:#0056cc; }
  #send:disabled { background:#999; cursor:not-allowed; }
  
  .typing-indicator { display:flex; gap:4px; padding:4px 0; }
  .typing-indicator span { width:6px; height:6px; border-radius:50%; background:#8e8e93; animation:bounce 1.4s ease infinite; }
  .typing-indicator span:nth-child(2) { animation-delay:0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay:0.4s; }
  @keyframes bounce { 0%,80%,100% { transform:translateY(0); } 40% { transform:translateY(-6px); } }

  /* 工具调用/思考步骤 */
  .steps-container { clear:both; margin:8px 0; max-width:85%; }
  .steps-container + .msg.bot { margin-top:12px; }
  .step-toggle { display:flex; align-items:center; gap:6px; width:100%; padding:6px 12px; background:#f0f0f2; border:1px solid #e0e0e3; border-radius:8px; font-size:12px; cursor:pointer; color:#555; transition:background .15s; }
  .step-toggle:hover { background:#e5e5ea; }
  .step-toggle .arrow { transition:transform .2s; font-size:10px; }
  .step-toggle.open .arrow { transform:rotate(90deg); }
  .step-toggle .tool-icon { font-size:14px; }
  .step-toggle .tool-name { font-weight:500; color:#333; }
  .step-details { display:none; padding:8px 12px; background:#f8f8fa; border:1px solid #e0e0e3; border-top:none; border-radius:0 0 8px 8px; font-size:13px; }
  .step-details.open { display:block; }
  .step-details .thought { color:#666; font-style:italic; margin-bottom:6px; white-space:pre-wrap; word-break:break-word; }
  .step-details .thought h1,.step-details .thought h2,.step-details .thought h3 { font-size:inherit; font-weight:600; }
  .step-details .thought p { margin:2px 0; }
  .step-details .thought code { background:#d4d4d9; padding:1px 4px; border-radius:3px; font-size:12px; }
  .step-details .args { background:#1c1c1e; color:#e8e8ed; padding:8px; border-radius:6px; font-size:12px; font-family:"SF Mono",Menlo,monospace; overflow-x:auto; margin-bottom:6px; }
  .step-details .result { background:#e8f5e9; color:#2e7d32; padding:8px; border-radius:6px; font-size:12px; white-space:pre-wrap; word-break:break-word; }

  /* 步骤进度标签 */
  .step-progress { display:flex; align-items:center; gap:8px; padding:6px 12px; margin-bottom:6px; font-size:12px; color:#8e8e93; background:#f8f8fa; border-radius:8px; }
  .step-progress .progress-bar { flex:1; height:4px; background:#e0e0e3; border-radius:2px; overflow:hidden; }
  .step-progress .progress-bar .fill { height:100%; background:#007aff; border-radius:2px; transition:width .4s ease; }

  /* 分析中提示 */
  .thinking-step { display:flex; align-items:center; gap:8px; padding:8px 12px; margin-bottom:4px; border-left:3px solid #007aff; background:#f0f5ff; border-radius:4px; font-size:13px; color:#555; }
  .thinking-step .dots { display:flex; gap:3px; }
  .thinking-step .dots span { width:5px; height:5px; border-radius:50%; background:#007aff; animation:throb 1.2s ease infinite; }
  .thinking-step .dots span:nth-child(2) { animation-delay:0.2s; }
  .thinking-step .dots span:nth-child(3) { animation-delay:0.4s; }
  @keyframes throb { 0%,60%,100% { opacity:0.3; transform:scale(1); } 30% { opacity:1; transform:scale(1.3); } }

  /* 生成回复中徽章 */
  .generating-badge { display:inline-flex; align-items:center; gap:6px; padding:5px 12px; background:#e8f0fe; border-radius:12px; font-size:11px; color:#555; margin:4px 0 0 20px; }
  .generating-badge .spin { width:10px; height:10px; border:2px solid #007aff; border-top-color:transparent; border-radius:50%; animation:spin .6s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* 输出区底部 loading 条 */
  #loading-bar { display:none; align-items:center; gap:8px; padding:10px 12px; margin:8px 24px 0; background:#f0f5ff; border:1px solid #d0e0ff; border-radius:10px; font-size:13px; color:#555; }
  #loading-bar.show { display:flex; }
  #loading-bar .bar-track { flex:1; height:4px; background:#d0e0ff; border-radius:2px; overflow:hidden; }
  #loading-bar .bar-track .bar-fill { height:100%; width:0; background:linear-gradient(90deg,#007aff,#30d158); border-radius:2px; animation:loadingSweep 1.5s ease infinite; }
  @keyframes loadingSweep { 0% { width:0; margin-left:0; } 50% { width:60%; margin-left:20%; } 100% { width:0; margin-left:100%; } }
  #loading-bar .label { white-space:nowrap; font-size:12px; color:#007aff; font-weight:500; }
  
  /* 设置弹窗 */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:100; align-items:center; justify-content:center; }
  .modal-overlay.active { display:flex; }
  .modal { background:#fff; border-radius:16px; padding:24px 28px; width:480px; max-width:90vw; box-shadow:0 20px 60px rgba(0,0,0,0.3); }
  .modal h2 { font-size:18px; margin-bottom:20px; }
  .form-group { margin-bottom:16px; }
  .form-group label { display:block; font-size:13px; font-weight:500; color:#555; margin-bottom:4px; }
  .form-group input,
  .form-group select { width:100%; padding:10px 12px; border:1px solid #ddd; border-radius:8px; font-size:14px; outline:none; transition:border-color .2s; background:#fff; }
  .form-group input:focus,
  .form-group select:focus { border-color:#007aff; }
  .form-group .hint { font-size:11px; color:#999; margin-top:4px; }
  .provider-row { display:flex; gap:8px; }
  .provider-row select { flex:1; min-width:0; }
  .provider-row button { padding:0 12px; border:1px solid #ddd; border-radius:8px; background:#f0f0f0; cursor:pointer; white-space:nowrap; }
  .provider-row button:hover { background:#e0e0e0; }
  .hidden { display:none; }
  .modal .btn-primary,
  .modal .btn-secondary {
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:14px;
    padding:8px 16px;
    white-space:nowrap;
    transition:background .15s, color .15s;
  }
  .modal .btn-primary { background:#007aff; color:#fff; }
  .modal .btn-primary:hover { background:#0056cc; }
  .modal .btn-primary:disabled { background:#999; cursor:not-allowed; }
  .modal .btn-secondary { background:#f0f0f0; color:#333; }
  .modal .btn-secondary:hover { background:#ddd; }
  .modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:20px; }
  .save-feedback { font-size:13px; margin-top:8px; padding:8px; border-radius:6px; text-align:center; }
  .save-feedback.ok { background:#e8f5e9; color:#2e7d32; }
  .save-feedback.err { background:#fbe9e7; color:#c62828; }
  .memory-toolbar { display:flex; gap:8px; margin-bottom:12px; }
  .memory-toolbar input { flex:1; padding:8px 10px; border:1px solid #ddd; border-radius:8px; font-size:13px; }
  .memory-toolbar button { min-width:64px; }
  .memory-list { max-height:320px; overflow-y:auto; border:1px solid #eee; border-radius:8px; }
  .memory-item { padding:10px 12px; border-bottom:1px solid #eee; }
  .memory-item:last-child { border-bottom:none; }
  .memory-key { display:flex; align-items:center; justify-content:space-between; gap:8px; font-size:13px; font-weight:600; color:#1d1d1f; }
  .memory-value { margin-top:6px; font-size:12px; color:#555; white-space:pre-wrap; word-break:break-word; }
  .memory-delete { background:transparent; border:none; color:#ff453a; cursor:pointer; font-size:12px; }

  /* 会话列表 */
  #session-header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px 4px; }
  #session-header h2 { font-size:15px; color:#8e8e93; text-transform:uppercase; letter-spacing:1px; padding:0; }
  #new-session-btn { background:#2c2c2e; color:#fff; border:none; border-radius:6px; padding:4px 10px; font-size:12px; cursor:pointer; }
  #new-session-btn:hover { background:#3a3a3c; }
  #session-list { flex:1; overflow-y:auto; }
  .session-item { padding:10px 16px; cursor:pointer; border-left:3px solid transparent; transition:all .15s; }
  .session-item:hover { background:#2c2c2e; }
  .session-item.active { background:#2c2c2e; border-left-color:#007aff; }
  .session-item .s-title { font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .session-item .s-meta { font-size:11px; color:#8e8e93; margin-top:2px; display:flex; gap:8px; }
  .session-item .s-del { margin-left:auto; background:transparent; border:none; color:#8e8e93; cursor:pointer; font-size:14px; padding:0 2px; visibility:hidden; }
  .session-item:hover .s-del { visibility:visible; }
  .session-item .s-del:hover { color:#ff453a; }

  /* 侧边栏折叠/移动端适配 */
  #sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:98; }
  #sidebar-overlay.show { display:block; }
  #sidebar-toggle { display:none; background:transparent; border:none; font-size:20px; cursor:pointer; padding:4px; color:#333; line-height:1; }
  #sidebar-toggle:hover { color:#007aff; }

  @media (max-width: 768px) {
    #sidebar-toggle { display:block; }
    #sidebar {
      position:fixed; left:0; top:0; bottom:0; z-index:99;
      transform:translateX(-100%); transition:transform .25s ease;
    }
    #sidebar.open { transform:translateX(0); }
    #messages { padding:12px 12px; }
    .msg { max-width:92%; font-size:13px; padding:10px 14px; }
    #header { padding:8px 10px; gap:4px; }
    #header .left { gap:4px; }
    #header .right { gap:4px; }
    #status-text { display:none; }
    #logout-btn { font-size:0; padding:6px 8px; }
    #logout-btn::after { content:"🚪"; font-size:16px; }
    #sidebar-toggle { font-size:18px; padding:2px; }
    #status-dot { width:6px; height:6px; flex-shrink:0; }
    #input-area { padding:8px 10px 14px; }
    #input { font-size:14px; padding:8px 12px; }
    #send { font-size:13px; padding:8px 14px; }
    .modal { width:95vw; padding:16px; }
    .msg.bot pre { font-size:12px; padding:8px; }
    .steps-container { max-width:98%; }
  }
  @media (min-width: 769px) {
    #sidebar.collapsed { width:0; overflow:hidden; border-right:none; padding:0; min-width:0; }
    #sidebar.collapsed > * { display:none; }
    #sidebar-toggle { display:block; }
  }
</style>
</head>
<body>

<div id="sidebar-overlay"></div>

<!-- 侧边栏 -->
<div id="sidebar">
  <div id="session-header">
    <h2>💬 会话</h2>
    <button id="new-session-btn">＋ 新建</button>
  </div>
  <div id="session-list">
    <div style="padding:16px;color:#8e8e93;font-size:13px;font-style:italic;">加载中...</div>
  </div>
  
  <div style="border-top:1px solid #2c2c2e; padding:12px 16px;">
    <div class="stat-card" id="provider-card" style="border:none;padding:0 0 10px;display:none;">
      <div class="label">🌐 模型服务商</div>
      <select id="quick-provider-select" title="切换模型厂商" onchange="quickSwitchProvider()" style="width:100%;margin-top:4px;padding:6px 8px;background:#2c2c2e;color:#fff;border:1px solid #3a3a3c;border-radius:6px;font-size:13px;outline:none;"></select>
    </div>
    <div class="stat-card" style="border:none;padding:0 0 8px;">
      <div class="label">工具调用</div>
      <div class="value" id="stat-calls">-</div>
    </div>
    <div class="stat-card" style="border:none;padding:0 0 8px;">
      <div class="label">模型 Token</div>
      <div class="value" id="stat-total" style="font-size:14px;">-</div>
    </div>
    <div class="stat-card" style="border:none;padding:0;">
      <div class="label">估算费用</div>
      <div class="value" id="stat-cost" style="font-size:14px;">$ -</div>
    </div>
  </div>

  <div style="border-top:1px solid #2c2c2e;">
    <h3 style="font-size:12px;padding:12px 16px 6px;color:#8e8e93;">🧩 技能</h3>
    <div id="skills-list">
      <div style="padding:8px 16px;font-size:13px;color:#8e8e93;font-style:italic;">加载中...</div>
    </div>
  </div>
</div>

<!-- 主区域 -->
<div id="main">
  <div id="header">
    <div class="left">
      <button id="sidebar-toggle">☰</button>
      <span id="status-dot"></span>
      <span id="status-text">连接中...</span>
    </div>
    <div class="right">
      <button class="header-btn" id="memory-btn">🧠 记忆</button>
      <button class="header-btn" id="settings-btn" style="display:none;">⚙️ 设置</button>
      <button id="logout-btn" onclick="logout()">🚪 登出</button>
    </div>
  </div>
  
  <div id="messages"></div>
  
  <div id="loading-bar"><div class="bar-track"><div class="bar-fill"></div></div><span class="label">AI 思考中...</span></div>
  <div id="input-area">
    <input id="input" placeholder="说点什么..." autocomplete="off" />
    <button id="send">发送</button>
  </div>
</div>

<!-- 记忆管理弹窗 -->
<div class="modal-overlay" id="memory-modal">
  <div class="modal">
    <h2>长期记忆</h2>
    <div class="form-group">
      <label for="m-key">记忆 Key</label>
      <input id="m-key" placeholder="例如 remote.deploy.host" />
    </div>
    <div class="form-group">
      <label for="m-value">记忆内容</label>
      <input id="m-value" placeholder="只保存长期有用、非敏感的信息" />
      <div class="hint">不要保存 API Key、密码、Cookie、Token 等敏感信息。</div>
    </div>
    <div class="memory-toolbar">
      <input id="m-search" placeholder="搜索记忆" />
      <button class="btn-secondary" type="button" onclick="loadMemories()">搜索</button>
      <button class="btn-primary" type="button" onclick="saveMemory()">保存</button>
    </div>
    <div class="memory-list" id="memory-list">
      <div style="padding:12px;color:#8e8e93;font-size:13px;">加载中...</div>
    </div>
    <div class="save-feedback" id="memory-feedback"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeMemory()">关闭</button>
    </div>
  </div>
</div>

<!-- 设置弹窗 -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <h2>⚙️ 设置</h2>
    <div class="form-group">
      <label for="s-provider">模型厂商</label>
      <div class="provider-row">
        <select id="s-provider" onchange="onProviderChange()"></select>
        <button type="button" onclick="addCustomProvider()">新增自定义</button>
      </div>
      <div class="hint" id="s-provider-hint">选择要使用的模型厂商。</div>
    </div>
    <div class="form-group hidden" id="s-provider-name-group">
      <label for="s-provider-name">厂商名称</label>
      <input id="s-provider-name" placeholder="例如 Mimo / 本地 LM Studio / 公司网关" />
      <div class="hint">自定义厂商会按这个名称显示在顶部切换器里。</div>
    </div>
    <div class="form-group">
      <label for="s-api-key">API Key</label>
      <input id="s-api-key" type="password" placeholder="sk-..." autocomplete="new-password" />
      <div class="hint" id="s-api-key-hint">留空则保留当前厂商已保存的 API Key。</div>
    </div>
    <div class="form-group">
      <label for="s-model">模型名称</label>
      <input id="s-model" list="s-model-options" placeholder="选择或输入模型名称" />
      <datalist id="s-model-options"></datalist>
      <div class="hint">可从候选中选择，也可以输入兼容接口支持的模型名。</div>
    </div>
    <div class="form-group">
      <label for="s-base-url">API 地址（可选）</label>
      <input id="s-base-url" placeholder="留空用 OpenAI 官方，DeepSeek: https://api.deepseek.com" />
      <div class="hint">自定义 API 地址，如 DeepSeek 填 https://api.deepseek.com</div>
    </div>
    <div class="form-group">
      <label for="s-recursion-limit">最大推理步数</label>
      <input id="s-recursion-limit" type="number" min="10" max="200" step="1" />
      <div class="hint">复杂任务或多次工具调用可适当调大；过大时循环任务会运行更久。</div>
    </div>
    <div class="save-feedback" id="save-feedback"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeSettings()">取消</button>
      <button class="btn-primary" id="save-settings-btn" onclick="saveSettings()">保存并重启</button>
    </div>
  </div>
</div>

<script>
const messages = document.getElementById('messages');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const quickProviderSelect = document.getElementById('quick-provider-select');
const settingsBtn = document.getElementById('settings-btn');
const providerCard = document.getElementById('provider-card');

let threadId = 'default';
let isLoading = false;
let sessionsCache = [];
let currentSessionId = null;
let settingsData = null;
let currentUser = null;
let isAdmin = false;

// 配置 Markdown 渲染（开启 XSS 过滤）
marked.setOptions({
  breaks: true,
  gfm: true,
});

function renderMarkdown(text) {
  // 基本 XSS 防护：只允许安全的标签
  const raw = marked.parse(text);
  const safe = raw
    .replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, '')
    .replace(/on\w+="[^"]*"/gi, '')
    .replace(/on\w+='[^']*'/gi, '')
    .replace(/javascript:/gi, '');
  return safe;
}

// ---------- 工具函数 ----------

function addMessage(text, role) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (role === 'bot') {
    // 渲染 Markdown
    div.innerHTML = renderMarkdown(text);
  } else {
    div.textContent = text;
  }
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}

function showTyping() {
  const bar = document.getElementById('loading-bar');
  const label = bar.querySelector('.label');
  if (label) label.textContent = 'AI 正在思考...';
  bar.classList.add('show');
  messages.scrollTop = messages.scrollHeight;
}

function hideTyping() {
  const bar = document.getElementById('loading-bar');
  bar.classList.remove('show');
}

// ---------- API 调用（流式） ----------

let currentBotMsgEl = null;       // 当前 bot 消息 DOM
let currentStepsEl = null;        // 当前步骤容器 DOM
let currentFinalContent = '';     // 累积的最终回复
let streamingActive = false;
let totalSteps = 0;               // 已完成的步骤数
let hasToolCalls = false;         // 本轮是否有工具调用
let generatingBadgeEl = null;     // 生成中徽章 DOM

function resetBlockingOverlays() {
  document.querySelectorAll('.modal-overlay.active').forEach(el => el.classList.remove('active'));
  document.getElementById('sidebar-overlay').classList.remove('show');
  document.getElementById('sidebar').classList.remove('open');
}

async function send() {
  const text = input.value.trim();
  if (!text || isLoading) return;
  
  addMessage(text, 'user');
  input.value = '';
  isLoading = true;
  sendBtn.disabled = true;
  streamingActive = true;
  showTyping();
  
  // 初始化步骤容器和 bot 消息
  currentStepsEl = null;
  currentBotMsgEl = null;
  currentFinalContent = '';
  totalSteps = 0;
  hasToolCalls = false;
  generatingBadgeEl = null;
  
  try {
    const res = await fetch(`/run/stream`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, thread_id: threadId }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      
      for (const line of lines) {
        if (line.startsWith('data: ') && line !== 'data: [DONE]') {
          const data = JSON.parse(line.slice(6));
          handleStreamEvent(data);
        }
      }
    }
    
    // 处理 buffer 中剩余内容
    if (buffer.startsWith('data: ') && buffer !== 'data: [DONE]') {
      const data = JSON.parse(buffer.slice(6));
      handleStreamEvent(data);
    }
    
  } catch (e) {
    if (streamingActive) {
      hideTyping();
      addMessage('⚠️ 连接中断', 'system');
    }
  }
  
  streamingActive = false;
  isLoading = false;
  sendBtn.disabled = false;
  input.focus();
  refreshStats();
  loadSessions();
}

function handleStreamEvent(data) {
  const container = document.getElementById('messages');

  function ensureStepsContainer() {
    if (currentStepsEl) return currentStepsEl;
    currentStepsEl = document.createElement('div');
    currentStepsEl.className = 'steps-container';
    if (currentBotMsgEl) {
      container.insertBefore(currentStepsEl, currentBotMsgEl);
    } else {
      container.appendChild(currentStepsEl);
    }
    return currentStepsEl;
  }
  
  // 工具函数：创建进度条（如果有步骤容器且有步骤数）
  function updateProgress() {
    if (!currentStepsEl) return;
    let prog = currentStepsEl.querySelector('.step-progress');
    if (!prog) {
      prog = document.createElement('div');
      prog.className = 'step-progress';
      prog.innerHTML = '<div class="progress-bar"><div class="fill" style="width:0%"></div></div><span class="progress-text">准备中...</span>';
      currentStepsEl.prepend(prog);
    }
    const fill = prog.querySelector('.fill');
    const text = prog.querySelector('.progress-text');
    if (fill && text) {
      const pct = totalSteps > 0 ? Math.min(90, Math.round((totalSteps / (totalSteps + 1)) * 100)) : 10;
      fill.style.width = pct + '%';
      text.textContent = `步骤 ${totalSteps}`;
    }
  }

  // 工具函数：移除分析中提示
  function removeThinkingHint() {
    if (currentStepsEl) {
      const hints = currentStepsEl.querySelectorAll('.thinking-step');
      hints.forEach(el => el.remove());
    }
  }

  // 工具函数：添加分析中提示
  function showThinkingHint(text) {
    removeThinkingHint();
    ensureStepsContainer();
    const hint = document.createElement('div');
    hint.className = 'thinking-step';
    hint.innerHTML = `<span>${text}</span><span class="dots"><span></span><span></span><span></span></span>`;
    // 放在进度条之后，但其他卡片之前
    const prog = currentStepsEl.querySelector('.step-progress');
    if (prog) {
      prog.after(hint);
    } else {
      currentStepsEl.prepend(hint);
    }
    container.scrollTop = container.scrollHeight;
  }

  // 工具函数：移除生成中徽章
  function removeGeneratingBadge() {
    if (generatingBadgeEl) {
      generatingBadgeEl.remove();
      generatingBadgeEl = null;
    }
  }

  switch (data.type) {
    case 'thought':
      hideTyping();
      removeThinkingHint();
      hasToolCalls = true;
      ensureStepsContainer();
      updateProgress();
      const thoughtText = data.thought || '';
      const thoughtDiv = document.createElement('div');
      thoughtDiv.style.marginBottom = '4px';
      thoughtDiv.dataset.step = data.step || '0';
      thoughtDiv.innerHTML = `
        <div class="step-toggle open" onclick="toggleStep(this)">
          <span class="arrow">▶</span>
          <span class="tool-icon">🤔</span>
          <span class="tool-name">思考</span>
          <span style="color:#999;font-size:11px;margin-left:auto;">第 ${data.step || '?'} 步</span>
        </div>
        <div class="step-details open">
          <div class="thought">${renderMarkdown(thoughtText)}</div>
        </div>`;
      currentStepsEl.appendChild(thoughtDiv);
      container.scrollTop = container.scrollHeight;
      break;
    
    case 'tool_start':
      hideTyping();
      removeThinkingHint();
      removeGeneratingBadge();
      hasToolCalls = true;
      totalSteps = data.step || totalSteps + 1;
      ensureStepsContainer();
      updateProgress();
      
      // 折叠之前所有步骤卡片，只展开当前新卡片
      if (currentStepsEl) {
        currentStepsEl.querySelectorAll('.step-toggle.open').forEach(el => {
          el.classList.remove('open');
          const d = el.nextElementSibling;
          if (d) d.classList.remove('open');
        });
      }
      
      const toolIcon = getToolIcon(data.tool);
      const argsHtml = data.args ? `<div class="args">${escapeHtml(JSON.stringify(data.args, null, 2))}</div>` : '';
      
      const stepDiv = document.createElement('div');
      stepDiv.style.marginBottom = '4px';
      stepDiv.dataset.step = data.step || '0';
      stepDiv.innerHTML = `
        <div class="step-toggle open" onclick="toggleStep(this)">
          <span class="arrow">▶</span>
          <span class="tool-icon">${toolIcon}</span>
          <span class="tool-name">${escapeHtml(data.tool)}</span>
          <span style="color:#999;font-size:11px;margin-left:auto;">⏳ 执行中...</span>
        </div>
        <div class="step-details open">
          ${argsHtml}
        </div>`;
      currentStepsEl.appendChild(stepDiv);
      container.scrollTop = container.scrollHeight;
      break;
    
    case 'tool_result':
      // 更新工具状态为完成
      if (currentStepsEl) {
        const toggles = currentStepsEl.querySelectorAll('.step-toggle');
        const lastToggle = toggles[toggles.length - 1];
        if (lastToggle) {
          const statusSpan = lastToggle.querySelector('span:last-child');
          if (statusSpan) statusSpan.textContent = '✅ 完成';
          
          const details = lastToggle.nextElementSibling;
          if (details && data.result) {
            const resultDiv = document.createElement('div');
            resultDiv.className = 'result';
            resultDiv.textContent = '✅ ' + data.result;
            details.appendChild(resultDiv);
          }
        }
      }
      // 显示"分析中，准备下一步..."
      showThinkingHint('🤔 分析结果');
      container.scrollTop = container.scrollHeight;
      break;
    
    case 'token':
      hideTyping();
      removeThinkingHint();
      // 如果之前有工具调用，显示"正在生成回复"徽章
      if (hasToolCalls && !generatingBadgeEl && !currentBotMsgEl) {
        generatingBadgeEl = document.createElement('div');
        generatingBadgeEl.className = 'generating-badge';
        generatingBadgeEl.innerHTML = '<span class="spin"></span> 正在生成回复...';
        if (currentStepsEl) {
          currentStepsEl.after(generatingBadgeEl);
        } else {
          container.appendChild(generatingBadgeEl);
        }
        container.scrollTop = container.scrollHeight;
      }
      // 开始输出 token（此时移除徽章）
      if (generatingBadgeEl && currentFinalContent === '') {
        generatingBadgeEl.remove();
        generatingBadgeEl = null;
      }
      if (!currentBotMsgEl) {
        currentBotMsgEl = document.createElement('div');
        currentBotMsgEl.className = 'msg bot streaming-final';
        if (currentStepsEl) {
          currentStepsEl.after(currentBotMsgEl);
        } else {
          container.appendChild(currentBotMsgEl);
        }
      }
      currentFinalContent += data.content;
      currentBotMsgEl.innerHTML = renderMarkdown(currentFinalContent);
      container.scrollTop = container.scrollHeight;
      break;
    
    case 'error':
      hideTyping();
      removeThinkingHint();
      removeGeneratingBadge();
      addMessage('❌ ' + data.content, 'system');
      break;
    
    case 'done':
      hideTyping();
      removeThinkingHint();
      removeGeneratingBadge();
      // 折叠所有步骤卡片
      if (currentStepsEl) {
        const toggles = currentStepsEl.querySelectorAll('.step-toggle');
        toggles.forEach(t => {
          t.classList.remove('open');
          const details = t.nextElementSibling;
          if (details) details.classList.remove('open');
        });
        // 更新进度为 100%
        const prog = currentStepsEl.querySelector('.step-progress');
        if (prog) {
          const fill = prog.querySelector('.fill');
          const text = prog.querySelector('.progress-text');
          if (fill) fill.style.width = '100%';
          if (text) text.textContent = `完成 ✓`;
        }
      }
      if (currentBotMsgEl && data.content) {
        currentBotMsgEl.innerHTML = renderMarkdown(data.content);
      }
      break;
  }
}

function getToolIcon(toolName) {
  const icons = {
    'read_file': '📖',
    'write_file': '✏️',
    'append_to_file': '📝',
    'list_files': '📂',
    'delete_file': '🗑️',
    'search_files': '🔍',
    'get_workspace_path': '📁',
    'run_python': '🐍',
    'get_system_info': '💻',
    'web_search': '🌐',
    'web_fetch': '📄',
  };
  return icons[toolName] || '🔧';
}

function toggleStep(el) {
  el.classList.toggle('open');
  const details = el.nextElementSibling;
  if (details) details.classList.toggle('open');
}

// ---------- 会话管理 ----------

function renderSessionList(sessions, currentId) {
  const container = document.getElementById('session-list');
  if (!sessions || sessions.length === 0) {
    container.innerHTML = '<div style="padding:16px;color:#8e8e93;font-size:13px;">暂无会话，新建一个开始对话</div>';
    return;
  }
  container.innerHTML = sessions.map(s => {
    const isActive = s.id === currentId;
    const time = s.updated_at ? s.updated_at.slice(5, 16).replace('T', ' ') : '';
    return `<div class="session-item ${isActive ? 'active' : ''}" data-id="${s.id}" onclick="switchSession('${s.id}')">
      <div class="s-title">${escapeHtml(s.title || '未命名')}</div>
      <div class="s-meta">
        <span>${s.message_count || 0} 条消息</span>
        <span>${time}</span>
        <button class="s-del" onclick="event.stopPropagation(); deleteSession('${s.id}')" title="删除">✕</button>
      </div>
    </div>`;
  }).join('');
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

async function loadSessions() {
  try {
    const res = await fetch('/sessions');
    if (!res.ok) return;
    const data = await res.json();
    sessionsCache = data.sessions || [];
    if (!currentSessionId) {
      currentSessionId = data.current_id || (sessionsCache[0] && sessionsCache[0].id) || null;
      threadId = currentSessionId || threadId;
    }
    // 如果服务端返回的当前会话不在列表中，优先回落到最新会话，避免加载不存在的 default。
    if (currentSessionId && !sessionsCache.find(s => s.id === currentSessionId)) {
      currentSessionId = (sessionsCache[0] && sessionsCache[0].id) || null;
      threadId = currentSessionId || threadId;
    }
    renderSessionList(sessionsCache, currentSessionId);
  } catch {}
}

async function loadSessionMessages(sessionId) {
  try {
    const res = await fetch(`/sessions/${sessionId}`);
    if (res.ok) {
      const data = await res.json();
      const container = document.getElementById('messages');
      container.innerHTML = '';
      if (data.messages && data.messages.length > 0) {
        data.messages.forEach(msg => {
          addMessage(msg.content, msg.role === 'user' ? 'user' : 'bot');
        });
      } else {
        addMessage('这是新的空白会话，发条消息开始吧', 'system');
      }
    }
  } catch {}
}

async function switchSession(sessionId, forceLoad = false) {
  if (sessionId === currentSessionId && !forceLoad) return;
  currentSessionId = sessionId;
  threadId = sessionId;
  
  // 更新激活样式
  document.querySelectorAll('.session-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === sessionId);
  });
  
  // 加载该会话的历史消息
  await loadSessionMessages(sessionId);
  refreshStats();
}

async function newSession() {
  try {
    const res = await fetch('/sessions', { method: 'POST' });
    if (!res.ok) return;
    const data = await res.json();
    currentSessionId = data.id;
    threadId = data.id;
    // 清空消息区域
    document.getElementById('messages').innerHTML = '';
    addMessage('新会话已创建，发条消息开始吧', 'system');
    await loadSessions();
  } catch {}
}

async function deleteSession(sessionId) {
  if (!confirm('确定删除此会话？')) return;
  try {
    await fetch(`/sessions/${sessionId}`, { method: 'DELETE' });
    if (sessionId === currentSessionId) {
      // 当前会话被删除，切到第一个或新建
      const remaining = sessionsCache.filter(s => s.id !== sessionId);
      if (remaining.length > 0) {
        switchSession(remaining[0].id);
      } else {
        newSession();
      }
    }
    await loadSessions();
  } catch {}
}

// ---------- 设置 ----------

function providerLabel(provider, id) {
  const name = provider.name || id;
  const model = provider.model || '未配置模型';
  return `${name} · ${model}`;
}

async function loadCurrentUser() {
  try {
    const res = await fetch('/users/me');
    if (!res.ok) return null;
    currentUser = await res.json();
  } catch {
    currentUser = null;
  }
  isAdmin = currentUser && currentUser.id === 'admin';
  settingsBtn.style.display = isAdmin ? '' : 'none';
  providerCard.style.display = isAdmin ? '' : 'none';
  if (!isAdmin) {
    document.getElementById('settings-modal').classList.remove('active');
  }
  return currentUser;
}

function populateProviderOptions(select, data, includeMissing = false) {
  select.innerHTML = '';
  Object.entries(data.providers || {}).forEach(([id, provider]) => {
    if (!includeMissing && (!provider.model || !provider.api_key_configured)) return;
    const option = document.createElement('option');
    option.value = id;
    option.textContent = providerLabel(provider, id);
    select.appendChild(option);
  });
}

function populateProviderSelect(data) {
  const select = document.getElementById('s-provider');
  populateProviderOptions(select, data, true);
  select.value = data.active_provider || 'openai';
}

function refreshQuickProviderSelect(data) {
  settingsData = data;
  populateProviderOptions(quickProviderSelect, data, true);
  quickProviderSelect.value = data.active_provider || 'openai';
}

async function loadSettingsForSwitcher() {
  if (!isAdmin) return null;
  try {
    const res = await fetch('/settings');
    if (!res.ok) return null;
    const data = await res.json();
    refreshQuickProviderSelect(data);
    return data;
  } catch {
    return null;
  }
}

function renderProviderFields(providerId) {
  if (!settingsData || !settingsData.providers) return;
  const provider = settingsData.providers[providerId] || {};
  const isCustom = !!provider.is_custom;
  const modelOptions = document.getElementById('s-model-options');
  modelOptions.innerHTML = '';
  (provider.models || []).forEach(modelName => {
    const option = document.createElement('option');
    option.value = modelName;
    modelOptions.appendChild(option);
  });
  
  document.getElementById('s-model').value = provider.model || '';
  document.getElementById('s-base-url').value = provider.base_url || '';
  document.getElementById('s-recursion-limit').value = settingsData.recursion_limit || 60;
  document.getElementById('s-api-key').value = '';
  document.getElementById('s-provider-name').value = provider.name || '';
  document.getElementById('s-provider-name-group').classList.toggle('hidden', !isCustom);
  document.getElementById('s-provider-hint').textContent = `当前厂商：${provider.name || providerId}`;
  document.getElementById('s-api-key-hint').textContent = provider.api_key_configured
    ? `已保存：${provider.api_key_preview}。留空则继续使用已保存的 API Key。`
    : '尚未保存 API Key。';
}

function onProviderChange() {
  renderProviderFields(document.getElementById('s-provider').value);
}

function addCustomProvider() {
  if (!settingsData) settingsData = { providers: {} };
  const id = `custom_${Date.now()}`;
  settingsData.providers[id] = {
    name: '新的自定义厂商',
    is_custom: true,
    api_key_configured: false,
    api_key_preview: '未设置',
    model: '',
    base_url: '',
    models: [],
  };
  settingsData.active_provider = id;
  populateProviderSelect(settingsData);
  renderProviderFields(id);
  document.getElementById('s-provider-name').focus();
  document.getElementById('s-provider-name').select();
}

function openSettings() {
  if (!isAdmin) return;
  const modal = document.getElementById('settings-modal');
  modal.classList.add('active');
  document.getElementById('save-feedback').textContent = '';
  document.getElementById('save-feedback').className = 'save-feedback';
  document.getElementById('save-settings-btn').disabled = false;
  
  // 加载当前配置
  fetch('/settings').then(r => r.json()).then(data => {
    settingsData = data;
    populateProviderSelect(data);
    refreshQuickProviderSelect(data);
    renderProviderFields(data.active_provider || 'openai');
  }).catch(() => {});
}

function closeSettings() {
  document.getElementById('settings-modal').classList.remove('active');
}

async function saveSettings() {
  if (!isAdmin) return;
  const btn = document.getElementById('save-settings-btn');
  const feedback = document.getElementById('save-feedback');
  btn.disabled = true;
  feedback.textContent = '保存中...';
  feedback.className = 'save-feedback';
  
  try {
    const res = await fetch('/settings', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        active_provider: document.getElementById('s-provider').value,
        provider_name: document.getElementById('s-provider-name').value,
        api_key: document.getElementById('s-api-key').value,
        model: document.getElementById('s-model').value,
        base_url: document.getElementById('s-base-url').value,
        recursion_limit: Number(document.getElementById('s-recursion-limit').value || 60),
      }),
    });
    const data = await res.json();
    if (data.status === 'ok') {
      feedback.textContent = '✅ ' + (data.message || '设置已保存');
      feedback.className = 'save-feedback ok';
      // 清空密码框
      document.getElementById('s-api-key').value = '';
      // 刷新状态
      setTimeout(async () => {
        closeSettings();
        await loadSettingsForSwitcher();
        checkHealth();
        refreshStats();
      }, 1000);
    } else {
      feedback.textContent = '⚠️ ' + (data.message || '保存失败');
      feedback.className = 'save-feedback err';
      btn.disabled = false;
    }
  } catch (e) {
    feedback.textContent = '❌ 网络错误，无法连接服务器';
    feedback.className = 'save-feedback err';
    btn.disabled = false;
  }
}

async function quickSwitchProvider() {
  if (!isAdmin) return;
  const providerId = quickProviderSelect.value;
  if (!providerId || !settingsData || !settingsData.providers) return;
  const provider = settingsData.providers[providerId];
  if (!provider) return;
  
  quickProviderSelect.disabled = true;
  try {
    const res = await fetch('/settings', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        active_provider: providerId,
        provider_name: provider.name || providerId,
        api_key: '',
        model: provider.model || '',
        base_url: provider.base_url || '',
        recursion_limit: settingsData.recursion_limit || 60,
      }),
    });
    const data = await res.json();
    if (data.status !== 'ok') {
      addMessage('⚠️ ' + (data.message || '切换模型失败'), 'system');
    }
    await loadSettingsForSwitcher();
    await checkHealth();
  } catch {
    addMessage('⚠️ 切换模型失败，无法连接服务器', 'system');
  } finally {
    quickProviderSelect.disabled = false;
  }
}

// ---------- 记忆管理 ----------

function openMemory() {
  document.getElementById('memory-modal').classList.add('active');
  document.getElementById('memory-feedback').textContent = '';
  document.getElementById('memory-feedback').className = 'save-feedback';
  loadMemories();
}

function closeMemory() {
  document.getElementById('memory-modal').classList.remove('active');
}

function renderMemories(items) {
  const list = document.getElementById('memory-list');
  if (!items || items.length === 0) {
    list.innerHTML = '<div style="padding:12px;color:#8e8e93;font-size:13px;">暂无长期记忆</div>';
    return;
  }
  list.innerHTML = items.map(item => {
    const key = escapeHtml(item.key || '');
    const encodedKey = encodeURIComponent(item.key || '');
    const value = escapeHtml(typeof item.value === 'string' ? item.value : JSON.stringify(item.value, null, 2));
    return `<div class="memory-item">
      <div class="memory-key">
        <span>${key}</span>
        <button class="memory-delete" onclick="deleteMemory(decodeURIComponent('${encodedKey}'))">删除</button>
      </div>
      <div class="memory-value">${value}</div>
    </div>`;
  }).join('');
}

async function loadMemories() {
  const q = document.getElementById('m-search').value.trim();
  try {
    const res = await fetch(`/memories${q ? '?q=' + encodeURIComponent(q) : ''}`);
    if (!res.ok) return;
    const data = await res.json();
    let items = data.items || [];
    if (q) {
      const lower = q.toLowerCase();
      items = items.filter(item => {
        const value = typeof item.value === 'string' ? item.value : JSON.stringify(item.value);
        return (item.key || '').toLowerCase().includes(lower) || value.toLowerCase().includes(lower);
      });
    }
    renderMemories(items);
  } catch {}
}

async function saveMemory() {
  const keyEl = document.getElementById('m-key');
  const valueEl = document.getElementById('m-value');
  const feedback = document.getElementById('memory-feedback');
  const key = keyEl.value.trim();
  const value = valueEl.value.trim();
  if (!key || !value) {
    feedback.textContent = '请填写 key 和内容';
    feedback.className = 'save-feedback err';
    return;
  }
  try {
    const res = await fetch('/memories', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key, value }),
    });
    const data = await res.json();
    if (res.ok) {
      feedback.textContent = data.message || '已保存';
      feedback.className = 'save-feedback ok';
      keyEl.value = '';
      valueEl.value = '';
      await loadMemories();
    } else {
      feedback.textContent = data.detail || '保存失败';
      feedback.className = 'save-feedback err';
    }
  } catch {
    feedback.textContent = '网络错误，保存失败';
    feedback.className = 'save-feedback err';
  }
}

async function deleteMemory(key) {
  if (!confirm(`确定删除记忆 ${key}？`)) return;
  try {
    await fetch(`/memories/${encodeURIComponent(key)}`, { method: 'DELETE' });
    await loadMemories();
  } catch {}
}

// 点击遮罩关闭
document.getElementById('settings-modal').addEventListener('click', function(e) {
  if (e.target === this) closeSettings();
});
document.getElementById('memory-modal').addEventListener('click', function(e) {
  if (e.target === this) closeMemory();
});

// 设置按钮
document.getElementById('settings-btn').onclick = openSettings;
document.getElementById('memory-btn').onclick = openMemory;
// 新建会话按钮
document.getElementById('new-session-btn').onclick = newSession;

// 登出
function logout() {
  fetch('/auth/logout', { method: 'POST' }).then(() => {
    window.location.href = '/login';
  });
}

// 侧边栏折叠逻辑
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  const isMobile = window.innerWidth <= 768;
  
  if (isMobile) {
    sidebar.classList.toggle('open');
    overlay.classList.toggle('show');
  } else {
    sidebar.classList.toggle('collapsed');
  }
}

document.getElementById('sidebar-toggle').onclick = toggleSidebar;
document.getElementById('sidebar-overlay').onclick = function() {
  document.getElementById('sidebar').classList.remove('open');
  this.classList.remove('show');
};

// 窗口大小变化时自动适配
window.addEventListener('resize', function() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  if (window.innerWidth > 768) {
    sidebar.classList.remove('open');
    overlay.classList.remove('show');
  }
});

// ---------- 更新状态 ----------

function setStatus(state) {
  statusDot.className = state === 'ok' ? 'online' : state === 'error' ? 'error' : '';
  statusText.textContent = state === 'ok' ? '已连接' : state === 'error' ? '连接失败' : '连接中...';
}

async function checkHealth() {
  try {
    const res = await fetch(`/health`);
    if (res.ok) {
      const data = await res.json();
      const modelName = data.model || '未配置';
      const providerName = data.provider_name || data.provider || '模型';
      if (data.status === 'ok') {
        setStatus('ok');
        statusText.textContent = `已连接 · ${providerName} · ${modelName}`;
      } else if (data.error && data.error.includes('credentials')) {
        setStatus('ok');
        statusText.textContent = `⚠️ 需要设置 API Key（当前: ${providerName} · ${modelName}）`;
      } else {
        setStatus('ok');
        statusText.textContent = `已连接 · ${providerName} · ${modelName}`;
      }
      return true;
    }
    setStatus('error');
    return false;
  } catch {
    setStatus('error');
    return false;
  }
}

async function refreshStats() {
  try {
    const res = await fetch(`/usage/session?thread_id=${encodeURIComponent(threadId)}`);
    if (res.ok) {
      const data = await res.json();
      const modelCalls = data.model_calls ?? data.calls ?? 0;
      const toolCalls = data.tool_calls ?? 0;
      document.getElementById('stat-calls').textContent = `${modelCalls} / ${toolCalls}`;
      document.getElementById('stat-total').textContent = data.total_tokens.toLocaleString() + ' tokens';
      document.getElementById('stat-cost').textContent = `$${data.cost.toFixed(6)}`;
    }
  } catch {}
}

async function refreshSkills() {
  try {
    const res = await fetch(`/skills`);
    if (res.ok) {
      const data = await res.json();
      const container = document.getElementById('skills-list');
      if (data.length === 0) {
        container.innerHTML = '<div class="skill-item" style="color:#8e8e93;">暂无技能</div>';
      } else {
        container.innerHTML = data.map(s => 
          `<div class="skill-item" title="${s.description || '无描述'}">📌 ${s.name}</div>`
        ).join('');
      }
    }
  } catch {}
}

input.onkeydown = (e) => { if (e.key === 'Enter') send(); };

setInterval(() => { checkHealth(); refreshStats(); }, 5000);

    if (sessionsCache.length > 0) {

        ? currentSessionId

    addMessage('cd agent_core\npython main.py', 'system');

  }
})();
