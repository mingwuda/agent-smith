<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Desktop Agent</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body {
      margin: 0; height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px;
      font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
      background: #f5f6f8; color: #2b2f36;
    }
    .spinner {
      width: 38px; height: 38px; border-radius: 50%;
      border: 4px solid #d8dce3; border-top-color: #3b82f6;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .txt { font-size: 15px; opacity: 0.85; }
    .sub { font-size: 12px; opacity: 0.5; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <div class="txt">正在启动 Desktop Agent…</div>
  <div class="sub">首次启动会初始化智能体内核，请稍候</div>
</body>
</html>
